<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CryptoEarner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-auto p-8">
        <div class="text-center mb-12">
            <div class="mx-auto w-16 h-16 bg-yellow-400 rounded-3xl flex items-center justify-center text-4xl text-zinc-900 mb-4">C</div>
            <h1 class="text-4xl heading-font font-bold">Welcome Back</h1>
        </div>
        
        <div class="bg-zinc-900 p-8 rounded-3xl">
            <div class="space-y-6">
                <div>
                    <label class="block text-sm mb-2 text-zinc-400">Email or Username</label>
                    <input id="email" type="text" value="demo@cryptoeearner.com" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-400">
                </div>
                <div>
                    <label class="block text-sm mb-2 text-zinc-400">Password</label>
                    <input id="pass" type="password" value="demo123" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-400">
                </div>
                <button onclick="login()" class="w-full py-4 bg-yellow-400 text-zinc-900 font-semibold rounded-2xl hover:bg-yellow-300">Sign In</button>
            </div>
            <div class="text-center mt-8 text-sm">
                Don't have an account? <a href="register.html" class="text-yellow-400">Sign up</a>
            </div>
        </div>
        
        <div onclick="showAdminLogin()" class="text-center mt-8 text-xs text-zinc-500 cursor-pointer hover:text-zinc-400">Admin Login →</div>
    </div>

    <script>
        function login() {
            alert("Login successful! Welcome to your dashboard.");
            window.location.href = "dashboard.html";
        }

        function showAdminLogin() {
            const username = prompt("Admin Username (makeit001):");
            const password = prompt("Password (Makemoney@12):");
            if (username === "makeit001" && password === "Makemoney@12") {
                window.location.href = "admin.html";
            } else {
                alert("Invalid credentials");
            }
        }
    </script>
</body>
</html>
