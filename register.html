<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CryptoEarner</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full">
        <div onclick="history.back()" class="mb-8 cursor-pointer inline-flex items-center gap-2 text-sm"><i class="fas fa-arrow-left"></i> Back</div>
        <h1 class="text-4xl font-bold heading-font mb-2">Create Account</h1>
        <p class="text-zinc-400 mb-10">Start earning today.</p>
        
        <div class="space-y-6 bg-zinc-900 p-8 rounded-3xl">
            <input type="text" placeholder="Full Name" class="w-full bg-zinc-800 px-5 py-4 rounded-2xl border border-zinc-700">
            <input type="email" placeholder="Email" class="w-full bg-zinc-800 px-5 py-4 rounded-2xl border border-zinc-700">
            <input type="password" placeholder="Password" class="w-full bg-zinc-800 px-5 py-4 rounded-2xl border border-zinc-700">
            <button onclick="registerUser()" class="w-full py-4 bg-yellow-400 text-zinc-900 font-semibold rounded-2xl">Create Free Account</button>
        </div>
    </div>

    <script>
        function registerUser() {
            alert("Account created successfully! Please login.");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
